{{ define "main" }}
<section class="hero">
  <div class="hero__content">
    <h1 class="hero__name">Lauren Hendriks</h1>
    <div class="hero__divider"></div>
    <p class="hero__tagline">voeding · gezondheid · leefstijl</p>
    <div class="hero__actions">
      <a href="{{ "/afspraak/" | relURL }}" class="btn btn--light">Plan een afspraak</a>
      <a href="{{ "/aanbod/" | relURL }}" class="btn btn--ghost">Bekijk het aanbod</a>
    </div>
  </div>
</section>

<section class="intro">
  <div class="container">
    <div class="intro__text">{{ .Content }}</div>
  </div>
</section>

<section class="pillars">
  <div class="container pillars__grid">
    {{ range .Params.pillars }}
    <div class="pillar">
      <h3>{{ .title }}</h3>
      <p>{{ .text }}</p>
    </div>
    {{ end }}
  </div>
</section>

{{ partial "testimonials.html" . }}
{{ end }}
