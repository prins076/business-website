<form action="{{ .Site.Params.formspreeEndpoint }}" method="POST" class="contact-form">
  <div class="form-group">
    <label for="name">Naam</label>
    <input type="text" id="name" name="name" required placeholder="Jouw naam">
  </div>
  <div class="form-group">
    <label for="email">E-mailadres</label>
    <input type="email" id="email" name="email" required placeholder="jouw@email.nl">
  </div>
  <div class="form-group">
    <label for="message">Bericht</label>
    <textarea id="message" name="message" rows="6" required placeholder="Schrijf hier je bericht..."></textarea>
  </div>
  {{/* Honeypot — hidden from users; bots fill it and Formspree drops the submission */}}
  <div class="form-honeypot" aria-hidden="true">
    <label for="company">Laat dit veld leeg</label>
    <input type="text" id="company" name="_gotcha" tabindex="-1" autocomplete="off">
  </div>
  <button type="submit" class="btn btn--primary">Verstuur bericht</button>
  <p class="form-privacy">Door dit formulier te versturen ga je akkoord met mijn <a href="{{ "/privacyverklaring/" | relURL }}">privacyverklaring</a>.</p>
</form>
